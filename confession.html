<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Confession</title>
  <link rel="stylesheet" href="assets/confession.css">
</head>
<body>
  <main class="center">
    <div class="card" role="dialog" aria-labelledby="confess-title">
      <div class="card-inner">
        <h1 id="confess-title">Can I Court you, Sofhia Brielle Galvez?</h1>
        <p class="subtitle">This is a small, honest question — choose your answer.</p>
        <div class="actions">
          <button id="cta-btn" class="btn primary">Yes 💖</button>
          <button id="maybe-btn" class="btn">Maybe</button>
        </div>
        <!-- Local confirmation modal (no external navigation) -->
        <div class="modal" id="confirm-modal" aria-hidden="true">
          <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <h2 id="modal-title">Send this message?</h2>
            <p class="modal-sub">This will record your response locally in the page (no external links).</p>
            <div class="modal-actions">
              <button id="modal-send" class="btn primary">Send</button>
              <button id="modal-cancel" class="btn">Cancel</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="assets/confession.js" defer></script>
</body>
</html>
